<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Guest Issues Tracker Dashboard — Austin Proper Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    /* ── Tokens ── */
    :root {
      --bg:           #f4f0e8;
      --bg-card:      #ffffff;
      --bg-pill:      #ebe6da;
      --gold:         #a97c2f;
      --gold-light:   #c49a3c;
      --gold-dim:     rgba(169,124,47,.10);
      --gold-faint:   rgba(169,124,47,.05);
      --gold-border:  rgba(169,124,47,.20);
      --gold-line:    rgba(169,124,47,.25);
      --text:         #1a1714;
      --text-2:       #6b6358;
      --text-3:       #a09082;
      --text-4:       #c5bbb0;
      --border:       rgba(0,0,0,.08);
      --border-card:  rgba(169,124,47,.13);
      --r:            10px;
      --r-sm:         6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      padding: 0 24px;
      background: rgba(244,240,232,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gold-line);
      box-shadow: 0 1px 12px rgba(0,0,0,.06);
    }
    .header-inner {
      max-width: 1240px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 24px; padding: 18px 0;
    }
    .hotel-eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); display: block; margin-bottom: 4px;
    }
    .dashboard-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 500;
      color: var(--text); letter-spacing: -.02em; line-height: 1.2;
    }
    .dashboard-meta {
      font-size: 12px; color: var(--text-2);
      font-weight: 300; margin-top: 3px;
    }
    .dashboard-meta .sep { margin: 0 6px; opacity: .4; }

    .refresh-btn {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 7px;
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500;
      letter-spacing: .04em;
      padding: 9px 18px; border-radius: var(--r-sm);
      cursor: pointer; white-space: nowrap;
      transition: background .18s, border-color .18s, opacity .18s;
      text-decoration: none;
    }
    .refresh-btn:hover:not(:disabled) { background: var(--gold-faint); border-color: var(--gold); }
    .refresh-btn:disabled { opacity: .45; cursor: not-allowed; }
    .refresh-icon { font-size: 15px; display: inline-block; }
    .spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .static-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-3);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 8px 14px; white-space: nowrap;
    }
    .static-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); opacity: .7;
    }

    /* ── Main ── */
    .app-main { max-width: 1240px; margin: 0 auto; padding: 28px 24px 48px; }
    .dashboard-grid { display: flex; flex-direction: column; gap: 20px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── Loading / Error ── */
    .state-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 100px 24px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    .state-text { font-size: 13px; color: var(--text-2); font-weight: 300; }
    .state-err { font-size: 13px; color: #9c6060; }
    .state-code { font-size: 11px; color: var(--text-3); font-family: monospace; margin-top: 6px; }

    /* ── Section Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: var(--r);
      padding: 26px 28px;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .card::after {
      content: '';
      position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-border) 40%, var(--gold-border) 60%, transparent);
      pointer-events: none;
    }
    .card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 16px;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 500;
      color: var(--text); letter-spacing: -.01em;
    }
    .card-sub { font-size: 11.5px; color: var(--text-2); margin-top: 4px; font-weight: 300; }
    .card-ts { font-size: 10.5px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; padding-top: 3px; }
    .empty { text-align: center; padding: 36px; font-size: 13px; color: var(--text-3); font-style: italic; }

    /* ── Urgent Issues ── */
    .urgent-section { margin-bottom: 22px; }
    .urgent-section:last-child { margin-bottom: 0; }
    .urgent-section-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: .13em;
      text-transform: uppercase; color: var(--sc, var(--gold));
      padding: 0 2px 8px; border-bottom: 2px solid var(--sc, var(--gold));
      margin-bottom: 4px;
    }
    .tbl { display: flex; flex-direction: column; }
    .tbl-head {
      display: grid;
      grid-template-columns: var(--tbl-cols, 36px 1fr 90px 80px 32px);
      gap: 12px; padding: 6px 10px 10px;
      font-size: 10px; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-3);
    }
    .tbl-row {
      display: grid;
      grid-template-columns: var(--tbl-cols, 36px 1fr 90px 80px 32px);
      gap: 12px; align-items: center;
      padding: 13px 10px;
      border-bottom: 1px solid var(--border);
      border-radius: var(--r-sm);
      transition: background .14s;
      cursor: pointer;
    }
    .tbl-row:last-child { border-bottom: none; }
    .tbl-row:hover { background: var(--gold-faint); }
    .tbl-row.active { background: var(--gold-faint); }
    .tbl-row.active .bar-arrow { transform: rotate(180deg); }

    /* ── Service Issues dept rows ── */
    .svc-list { display: flex; flex-direction: column; }
    .svc-row {
      display: grid;
      grid-template-columns: 160px 1fr 80px 80px 28px;
      gap: 12px; align-items: center;
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer; transition: background .14s;
    }
    .svc-row:last-of-type { border-bottom: none; }
    .svc-row:hover, .svc-row.active { background: var(--gold-faint); }
    .svc-row.active .bar-arrow { transform: rotate(180deg); }
    .svc-label { font-size: 13.5px; font-weight: 500; color: var(--text); }
    .svc-bar-wrap { background: var(--bg); border-radius: 3px; height: 7px; overflow: hidden; }
    .svc-bar-fill { height: 100%; background: var(--gold); opacity: .7; border-radius: 3px; transition: width .3s; }
    .svc-count { text-align: right; }
    .svc-date { font-size: 12px; color: var(--text-3); }

    /* ── Urgent Drill-down (click → recent examples) ── */
    .urgent-drill {
      margin: 0 10px 8px 10px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      animation: fadeIn .15s ease;
    }

    /* ── Issue Breakdown Tooltip (hover) ── */
    .issue-tooltip {
      position: fixed; z-index: 1000;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 8px 32px rgba(0,0,0,.14);
      padding: 14px 16px;
      min-width: 270px; max-width: 340px;
      pointer-events: none;
      animation: fadeIn .12s ease;
    }
    .tt-title {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-2);
      margin-bottom: 10px;
    }
    .tt-row {
      display: grid; grid-template-columns: 1fr 80px 28px;
      gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .tt-label { font-size: 12px; color: var(--text); }
    .tt-bar-wrap { background: var(--bg); border-radius: 3px; height: 6px; overflow: hidden; }
    .tt-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; }
    .tt-cnt { font-size: 12px; font-weight: 600; color: var(--text-2); text-align: right; }
    .tt-empty { font-size: 12px; color: var(--text-3); padding: 4px 0; }
    .tt-hint { font-size: 11px; color: var(--text-3); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }

    .rank {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-pill); border: 1px solid var(--border);
      color: var(--text-2); font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rank-gold { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
    .rank-silver { background: var(--gold-faint); border-color: var(--gold-border); color: var(--gold); }

    .issue-name { font-size: 13.5px; color: var(--text); }
    .pill {
      display: inline-flex; align-items: center;
      background: var(--gold-dim); color: var(--gold-light);
      border-radius: 20px; padding: 3px 12px;
      font-size: 12px; font-weight: 700;
      font-variant-numeric: tabular-nums; min-width: 36px;
    }
    .issue-date { font-size: 12px; color: var(--text-2); }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: rgba(0,0,0,.04); color: var(--text-2);
      font-size: 10.5px; padding: 2px 8px;
      border-radius: 4px; border: 1px solid rgba(0,0,0,.07);
      white-space: nowrap;
    }
    .tag-dim { color: var(--text-3); }

    /* ── Room Cards ── */
    .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: 10px; }
    .room-card {
      background: var(--gold-faint); border: 1px solid var(--border-card);
      border-radius: var(--r-sm); padding: 14px;
      transition: border-color .18s, background .18s;
    }
    .room-card:hover { border-color: var(--gold-border); background: var(--gold-dim); }
    .room-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .room-num { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text); }
    .room-cnt {
      font-size: 11px; font-weight: 700; color: var(--gold);
      background: var(--gold-dim); padding: 2px 8px; border-radius: 10px;
    }
    .room-last { font-size: 10.5px; color: var(--text-3); margin-bottom: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 3px; }
    .chip {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: rgba(0,0,0,.04); color: var(--text-2);
      border: 1px solid rgba(0,0,0,.07);
    }
    .chip-dim { color: var(--text-3); }

    /* ── Dept Bar List ── */
    .bar-list { display: flex; flex-direction: column; gap: 0; }
    .bar-row {
      display: grid; grid-template-columns: 185px 1fr 38px 20px;
      align-items: center; gap: 12px;
      padding: 7px 6px; border-radius: var(--r-sm);
      cursor: pointer; transition: background .14s;
    }
    .bar-row:hover { background: var(--gold-faint); }
    .bar-row.active { background: var(--gold-faint); }
    .bar-label { font-size: 13px; color: var(--text); }
    .bar-track { height: 5px; background: rgba(0,0,0,.07); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; }
    .bar-num { font-size: 13px; font-weight: 600; color: var(--gold); text-align: right; font-variant-numeric: tabular-nums; }
    .bar-arrow { font-size: 10px; color: var(--text-3); text-align: center; transition: transform .2s; }
    .bar-row.active .bar-arrow { transform: rotate(180deg); }

    /* ── Dept Drill-down ── */
    .dept-drill {
      margin: 2px 6px 6px 6px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .drill-header {
      font-size: 10px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }
    .drill-total { font-weight: 400; text-transform: none; letter-spacing: 0; }
    .drill-row {
      display: grid; grid-template-columns: 1fr 90px 32px;
      align-items: center; gap: 10px;
      padding: 5px 0; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .drill-row:last-child { border-bottom: none; }
    .drill-cat { color: var(--text); }
    .drill-bar-wrap { height: 4px; background: rgba(0,0,0,.06); border-radius: 2px; overflow: hidden; }
    .drill-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; opacity: .7; }
    .drill-cnt { font-size: 12px; font-weight: 600; color: var(--gold); text-align: right; font-variant-numeric: tabular-nums; }
    .incident-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .incident-row:last-child { border-bottom: none; }
    .incident-title { font-size: 12.5px; color: var(--text); line-height: 1.45; }
    .incident-meta { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .incident-meta .imeta-dept { color: var(--gold); font-weight: 500; }

    /* ── Venue Cards ── */
    .venue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; }
    .venue-card {
      text-align: center;
      background: var(--gold-faint); border: 1px solid var(--border-card);
      border-radius: var(--r-sm); padding: 20px 12px;
      transition: border-color .18s;
    }
    .venue-card:hover { border-color: var(--gold-border); }
    .venue-name { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
    .venue-num { font-size: 38px; font-weight: 300; color: var(--gold); line-height: 1; font-variant-numeric: tabular-nums; }
    .venue-lbl { font-size: 10.5px; color: var(--text-3); margin-top: 4px; }

    /* ── YTD ── */
    .ytd-hero { display: flex; align-items: baseline; gap: 14px; margin-bottom: 26px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .ytd-big { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 400; color: var(--gold); line-height: 1; font-variant-numeric: tabular-nums; }
    .ytd-lbl { font-size: 13px; color: var(--text-2); font-weight: 300; }
    .chart-wrap { margin-bottom: 26px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .chart-heading { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text-2); font-weight: 400; margin-bottom: 14px; }
    .chart-canvas { width: 100% !important; height: 190px !important; }
    .ytd-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .ytd-col-title { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text-2); font-weight: 400; margin-bottom: 10px; }
    .ytd-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 12.5px; color: var(--text); border-bottom: 1px solid var(--border); }
    .ytd-row:last-child { border-bottom: none; }
    .ytd-cnt { font-weight: 600; color: var(--gold); font-variant-numeric: tabular-nums; }

    /* ── Footer ── */
    .app-footer { border-top: 1px solid var(--border); padding: 18px 24px; text-align: center; }
    .app-footer p { font-size: 10.5px; color: var(--text-4); letter-spacing: .1em; text-transform: uppercase; }

    .see-more-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500;
      letter-spacing: .04em;
      padding: 8px 20px; border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .18s, border-color .18s;
    }
    .see-more-btn:hover { background: var(--gold-faint); border-color: var(--gold); }

    /* ── Period Bar ── */
    .period-bar {
      background: #ede8de;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .period-inner {
      max-width: 1240px; margin: 0 auto;
      display: flex; align-items: center;
      gap: 16px; padding: 10px 0;
      flex-wrap: wrap;
    }
    .period-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .period-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500;
      letter-spacing: .04em;
      padding: 6px 14px; border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .period-btn:hover { border-color: var(--gold-border); color: var(--gold); }
    .period-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
    .custom-range { display: flex; align-items: center; gap: 8px; }
    .custom-range input[type="date"] {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 5px 10px; border-radius: var(--r-sm);
      outline: none; cursor: pointer;
    }
    .custom-range input[type="date"]:focus { border-color: var(--gold-border); }
    .range-sep { color: var(--text-3); font-size: 12px; }

    /* ── Responsive ── */
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .app-header { padding: 0 16px; position: relative; }
      .header-inner { flex-direction: column; align-items: flex-start; padding: 16px 0; gap: 14px; }
      .dashboard-title { font-size: 22px; }
      .app-main { padding: 20px 16px 40px; }
      .card { padding: 20px 18px; }
      .tbl-head { display: none; }
      .tbl-row { grid-template-columns: 36px 1fr; grid-template-rows: auto auto auto; gap: 6px 10px; padding: 14px 8px; }
      .tbl-row > *:nth-child(3),
      .tbl-row > *:nth-child(4),
      .tbl-row > *:nth-child(5) { grid-column: 2; }
      .tbl-row > *:nth-child(6) { display: none; }
      .tags { display: none; }
      .bar-row { grid-template-columns: 130px 1fr 34px; }
      .ytd-big { font-size: 48px; }
      .ytd-tables { grid-template-columns: 1fr; gap: 20px; }
    }
    @media (max-width: 480px) {
      .room-grid { grid-template-columns: 1fr 1fr; }
      .venue-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="issue-tooltip" class="issue-tooltip" style="display:none"></div>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-inner">
    <div>
      <span class="hotel-eyebrow">Austin Proper Hotel</span>
      <h1 class="dashboard-title">Guest Issues Tracker Dashboard</h1>
      <p class="dashboard-meta" id="meta">Live · Notion Guest Issues Task Tracker</p>
    </div>
    <div id="headerAction"></div>
  </div>
</header>

<!-- ── Period Filter ─────────────────────────────────────────────────────── -->
<div class="period-bar">
  <div class="period-inner">
    <div class="period-btns">
      <button class="period-btn" data-period="7d" onclick="selectPeriod('7d')">7 Days</button>
      <button class="period-btn" data-period="mtd" onclick="selectPeriod('mtd')">MTD</button>
      <button class="period-btn active" data-period="30d" onclick="selectPeriod('30d')">Last 30 Days</button>
      <button class="period-btn" data-period="90d" onclick="selectPeriod('90d')">Last 90 Days</button>
      <button class="period-btn" data-period="ytd" onclick="selectPeriod('ytd')">YTD</button>
      <button class="period-btn" data-period="custom" onclick="selectPeriod('custom')">Custom</button>
    </div>
    <div class="custom-range" id="customRange" style="display:none">
      <input type="date" id="customFrom" onchange="applyCustom()" />
      <span class="range-sep">&#8594;</span>

]);

  if (POSITIVE_CATS.has(cat)) return true;

  if (t.includes('excellence') || t.includes('highlight') ||
      t.includes('compliment') || t.includes('recognition') ||
      t.includes('promoter')) return true;
  // "positive" only when not part of a negative phrase
  if (t.includes('positive') && !t.includes('false positive')) return true;
  // Bare "Guest Service" without a failure/issue qualifier
  if (t.startsWith('guest service') &&

  if (isNonActionable(cat)) return 'positive';

function classifyIssue(title, primaryCat) {
  const rules = ISSUE_CLASSIFIERS[primaryCat];
  if (!rules || !title) return null;
  const t = title.toLowerCase();
  for (const { sub, keys } of rules) {
    if (keys.some(k => t.includes(k))) return sub;
  }
  return 'Other';
}

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.length === 10 ? 'T00:00:00Z' : ''));
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', timeZone:'UTC' });
}

function fmtTs(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-US', {
    weekday:'short', month:'short', day:'numeric',
    hour:'numeric', minute:'2-digit', hour12:true
  });
}

function daysAgoLabel(s) {
  if (!s) return '—';
  const diff = (Date.now() - new Date(s + (s.length === 10 ? 'T00:00:00Z' : '')).getTime()) / 86400000;
  if (diff < 1) return 'Today';
  if (diff < 2) return 'Yesterday';
  return `${Math.round(diff)}d ago`;
}

function stripFnb(s) { return s.replace(/^F&B\s*[-–]\s*/i, ''); }

function h(tag, cls, content, attrs = '') {
  return `<${tag} class="${cls}" ${attrs}>${content}</${tag}>`;
}

// ── Period helpers ─────────────────────────────────────────────────────────
function getPeriodRange(period, fromVal, toVal) {
  const now = new Date();
  const todayEnd = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 23, 59, 59));
  if (period === '7d') {
    const s = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 6));
    return [s, todayEnd];
  }
  if (period === 'mtd') {
    return [new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), 1)), todayEnd];
  }
  if (period === '30d') {
    const s = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 29));
    return [s, todayEnd];
  }
  if (period === '90d') {
    const s = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 89));
    return [s, todayEnd];
  }
  if (period === 'ytd') {
    return [new Date(Date.UTC(now.getUTCFullYear(), 0, 1)), todayEnd];
  }
  if (period === 'custom' && fromVal && toVal) {
    return [new Date(fromVal + 'T00:00:00Z'), new Date(toVal + 'T23:59:59Z')];
  }
  return [null, null];
}

function getPeriodLabel(period, startDate, endDate) {
  const opts = { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' };
  if (period === '7d')  return 'Last 7 Days';
  if (period === 'mtd') return 'Month to Date';
  if (period === '30d') return 'Last 30 Days';
  if (period === '90d') return 'Last 90 Days';
  if (period === 'ytd') return 'Year to Date';
  if (period === 'custom' && startDate && endDate) {
    return startDate.toLocaleDateString('en-US', opts) + ' \u2013 ' + endDate.toLocaleDateString('en-US', opts);
  }
  return 'Custom Range';
}

// Shared helper — used in computeSections AND in drillServiceDept/showServiceTooltip
function matchesDept(r, entry) {
  const deptSet = new Set(entry.depts || []);
  const titleL = (r.title || '').toLowerCase();
  const cats = r.cats || [];
  if (entry.catKeys) {
    const catKeySet = new Set(entry.catKeys);
    if (!cats.some(c => catKeySet.has(c))) {
      if (!(entry.titleKeys && entry.titleKeys.some(k => titleL.includes(k)))) return false;
    }
  }
  if (entry.titleKeys && !entry.titleKeys.some(k => titleL.includes(k))) {
    if (entry.catKeys || !entry.depts) return false;
    return false;
  }
  if (entry.excludeTitleKeys && entry.excludeTitleKeys.some(k => titleL.includes(k))) return false;
  return deptSet.has(r.dept);
}

// ── Compute sections from raw records ─────────────────────────────────────
function computeSections(records, startDate, endDate) {
  const filtered = records.filter(r => {
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    return d >= startDate && d <= endDate;
  });

  const now = new Date();
  const periodDays = (endDate - startDate) / 86400000 || 1;

  // ── Service Issues — organized by department in prescribed order ──
  const serviceDepts = SERVICE_DEPT_ORDER.map(entry => {
    const recs = filtered.filter(r => matchesDept(r, entry));
    if (!recs.length) return null;
    const lastDate = recs.reduce((best, r) => (!best || r.date > best ? r.date : best), null);
    return { label: entry.label, count: recs.length, lastDate };
  }).filter(Boolean);

  // ── Facility Issues — top recurring physical/room categories ──
  const facMap = {};
  for (const r of filtered) {
    for (const rawCat of (r.cats || [])) {
      const cat = normalizeCat(rawCat);
      if (catType(cat) !== 'facility') continue;
      if (!facMap[cat]) facMap[cat] = { count: 0, lastDate: null };
      facMap[cat].count++;
      if (!facMap[cat].lastDate || r.date > facMap[cat].lastDate) facMap[cat].lastDate = r.date;
    }
  }

  function rankCats(map, minOccurrences, limit) {
    const maxCount = Math.max(1, ...Object.values(map).map(v => v.count));
    return Object.entries(map)
      .filter(([, v]) => v.count >= minOccurrences)
      .map(([cat, v]) => {
        const daysAgo = (now - new Date(v.lastDate + (v.lastDate.length === 10 ? 'T00:00:00Z' : ''))) / 86400000;
        const recency = Math.max(0, 1 - daysAgo / periodDays);
        const score = 0.6 * (v.count / maxCount) + 0.4 * recency;
        return { category: cat, count: v.count, lastOccurrence: v.lastDate, score };
      })
      .sort((a, b) => b.score - a.score)
      .slice(0, limit);
  }

  const facilityIssues = rankCats(facMap, 2, 8);

  // ── Room Patterns (facility only, 2+ occurrences) ──
  const roomMap = {};
  for (const r of filtered) {
    if (!r.room) continue;
    const fCats = (r.cats || []).filter(c => FACILITY_CATS.has(c));
    if (!fCats.length) continue;
    if (!roomMap[r.room]) roomMap[r.room] = { count: 0, lastDate: null, cats: {} };
    roomMap[r.room].count++;
    if (!roomMap[r.room].lastDate || r.date > roomMap[r.room].lastDate) roomMap[r.room].lastDate = r.date;
    fCats.forEach(c => roomMap[r.room].cats[c] = true);
  }
  const roomPatterns = Object.entries(roomMap)
    .filter(([, v]) => v.count >= 2)
    .map(([room, v]) => ({ room, count: v.count, lastDate: v.lastDate, issueTypes: Object.keys(v.cats) }))
    .sort((a, b) => b.count - a.count);

  // ── Public Space Issues ──
  const spaceMap = {};
  for (const r of filtered) {
    const spacesHit = {};
    for (const cat of (r.cats || [])) {
      const space = PUBLIC_SPACE_MAP[cat];
      if (!space) continue;
      if (!spaceMap[space]) spaceMap[space] = { count: 0, lastDate: null, issues: {} };
      if (!spacesHit[space]) { spaceMap[space].count++; spacesHit[space] = true; }
      if (!spaceMap[space].lastDate || r.date > spaceMap[space].lastDate) spaceMap[space].lastDate = r.date;
      spaceMap[space].issues[cat] = true;
    }
  }
  const publicSpacePatterns = Object.entries(spaceMap)
    .map(([space, v]) => ({ space, count: v.count, lastDate: v.lastDate, issues: Object.keys(v.issues) }))
    .sort((a, b) => b.count - a.count);

  // ── Department Patterns ──
  const deptCounts = {};
  for (const r of filtered) {
    if (r.dept) deptCounts[r.dept] = (deptCounts[r.dept] || 0) + 1;
  }
  const deptPatterns = Object.entries(deptCounts)
    .map(([dept, count]) => ({ dept, count }))
    .sort((a, b) => b.count - a.count);

  const venuePatterns = deptPatterns.filter(d => FNB_DEPTS.has(d.dept));

  return { serviceDepts, facilityIssues, roomPatterns, publicSpacePatterns, deptPatterns, venuePatterns };
}

function computeYTD(records) {
  const now = new Date();
  const ytdStart = new Date(Date.UTC(now.getUTCFullYear(), 0, 1));
  const ytdEnd   = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 23, 59, 59));
  const filtered = records.filter(r => {
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    return d >= ytdStart && d <= ytdEnd;
  });

  const deptMap = {}, monthMap = {};
  for (const r of filtered) {
    if (r.dept) deptMap[r.dept] = (deptMap[r.dept] || 0) + 1;
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    const key = d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
    monthMap[key] = (monthMap[key] || 0) + 1;
  }

  const byDepartment = Object.entries(deptMap)
    .map(([dept, count]) => ({ dept, count })).sort((a, b) => b.count - a.count);
  const byVenue = byDepartment.filter(d => FNB_DEPTS.has(d.dept));
  const monthlyTrend = Object.keys(monthMap).sort().map(key => {
    const [y, m] = key.split('-');
    const d = new Date(Date.UTC(+y, +m - 1, 1));
    return { month: d.toLocaleDateString('en-US', { month: 'short', year: 'numeric', timeZone: 'UTC' }), count: monthMap[key] };
  });

  return { total: filtered.length, byDepartment, byVenue, monthlyTrend };
}

function card(title, sub, ts, body) {

      <div class="card-header">
        <div>
          <h2 class="card-title">${title}</h2>
          ${sub ? `<p class="card-sub">${sub}</p>` : ''}

        ${ts ? `<span class="card-ts">Updated ${fmtTs(ts)}</span>` : ''}
      </div>
      ${body}

}

function urgentDeptSafeId(label) {
  return 'sdrill-' + label.replace(/[^a-z0-9]/gi, '-').toLowerCase();
}

function buildServiceSection(depts, ts, pl) {
  pl = pl || 'Last 30 Days';
  if (!depts || !depts.length) {
    return card('Service Issues \u2014 ' + pl, 'By department \u00b7 Hover for issue breakdown \u00b7 Click for examples', ts,
      '<div class="empty">No service issues recorded in this period.</div>');
  }
  const maxCount = Math.max(...depts.map(d => d.count));
  const rows = depts.map(d => {
    const uid = urgentDeptSafeId(d.label);
    const esc = d.label.replace(/'/g, "\\'");
    const barW = (d.count / maxCount * 100).toFixed(1);
    return `
    <div class="svc-row" onclick="drillServiceDept('${esc}', this)" onmouseenter="showServiceTooltip('${esc}', this)" onmouseleave="hideUrgentTooltip()">
      <span class="svc-label">${d.label}</span>
      <div class="svc-bar-wrap"><div class="svc-bar-fill" style="width:${barW}%"></div></div>
      <span class="svc-count"><span class="pill">${d.count}</span></span>
      <span class="svc-date issue-date">${daysAgoLabel(d.lastDate)}</span>
      <span class="bar-arrow">&#9660;</span>
    </div>
    <div class="urgent-drill" id="${uid}" style="display:none"></div>`;
  }).join('');
  return card('Service Issues \u2014 ' + pl,
    'By department \u00b7 Hover for issue breakdown \u00b7 Click for recent examples',
    ts,
    `<div class="svc-list">${rows}</div>`);
}

      'Physical room &amp; infrastructure \u00b7 Hover for breakdown \u00b7 Click for examples', ts,
      '<div class="empty">No recurring facility issues in this period.</div>');

  const rankClass = i => i === 0 ? 'rank rank-gold' : i <= 2 ? 'rank rank-silver' : 'rank';

      <span class="bar-arrow">&#9660;</span>

function buildRooms(rooms, ts, pl) {
  pl = pl || 'Last 30 Days';
  if (!rooms || !rooms.length) {
    return card('Recurrent Patterns by Room', `Facility issues only \u00b7 2+ occurrences \u00b7 ${pl}`, ts, '<div class="empty">No rooms with 2+ facility issues in this period.</div>');
  }

  const VISIBLE = 6;
  const visible = rooms.slice(0, VISIBLE);
  const extra   = rooms.slice(VISIBLE);

  function roomCard(r) {
    var chips = r.issueTypes.slice(0, 4).map(function(c) {
      return '<span class="chip">' + c + '</span>';
    }).join('');
    if (r.issueTypes.length > 4) chips += '<span class="chip chip-dim">+' + (r.issueTypes.length - 4) + '</span>';
    return '<div class="room-card">' +
      '<div class="room-hdr"><span class="room-num">Room ' + r.room + '</span><span class="room-cnt">' + r.count + '×</span></div>' +
      '<div class="room-last">Last: ' + fmtDate(r.lastDate) + '</div>' +
      '<div class="chips">' + chips + '</div>' +
      '</div>';
  }

  var body = '<div class="room-grid">' + visible.map(roomCard).join('') + '</div>';

  if (extra.length > 0) {
    body += '<div id="room-extra-wrap" style="display:none">' +
              '<div class="room-grid" style="margin-top:10px">' + extra.map(roomCard).join('') + '</div>' +
            '</div>' +
            '<div style="text-align:center;margin-top:16px">' +
              '<button class="see-more-btn" id="room-toggle-btn" data-count="' + extra.length + '" onclick="toggleRooms()">' +
                'See more rooms &#9660;' +
              '</button>' +
            '</div>';
  }

  return card('Recurrent Patterns by Room', `Facility issues only \u00b7 2+ occurrences \u00b7 ${pl}`, ts, body);
}

function toggleRooms() {
  var wrap  = document.getElementById('room-extra-wrap');
  var btn   = document.getElementById('room-toggle-btn');
  var count = btn.getAttribute('data-count');
  var open  = wrap.style.display !== 'none';
  wrap.style.display = open ? 'none' : 'block';
  btn.innerHTML = open ? 'See more rooms &#9660;' : '&#9650; Show fewer';
}

function buildPublicSpaces(spaces, ts, pl) {
  pl = pl || 'Last 30 Days';
  const body = (!spaces || !spaces.length)
    ? '<div class="empty">No public space facility issues in this period.</div>'
    : `<div class="room-grid">${spaces.map(s => `
        <div class="room-card">
          <div class="room-hdr">
            <span class="room-num">${s.space}</span>
            <span class="room-cnt">${s.count}\u00d7</span>
          </div>
          <div class="room-last">Last: ${fmtDate(s.lastDate)}</div>
          <div class="chips">
            ${s.issues.slice(0,4).map(c => `<span class="chip">${c}</span>`).join('')}
            ${s.issues.length > 4 ? `<span class="chip chip-dim">+${s.issues.length - 4}</span>` : ''}
          </div>
        </div>`).join('')}</div>`;
  return card(
    'Public Space Facility Issues',
    `Physical defects in shared areas \u2014 pool, lobby, fitness center \u00b7 ${pl}`,
    ts, body
  );
}

function deptSafeId(dept) {
  return 'drill-' + dept.replace(/[^a-z0-9]/gi, '-').toLowerCase();
}

function buildDepts(depts, ts, pl) {
  pl = pl || 'Last 30 Days';
  if (!depts || !depts.length) {
    return card('Recurrent Patterns by Department', `Issue volume ranked by department \u2014 ${pl}`, ts, '<div class="empty">No data for this period.</div>');
  }
  const max = Math.max(...depts.map(d => d.count), 1);
  const rows = depts.map((d, i) => {
    const sid = deptSafeId(d.dept);
    const esc = d.dept.replace(/'/g, "\\'");
    return `
    <div class="bar-row" onclick="drillDept('${esc}', this)">
      <span class="bar-label">${d.dept}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(d.count/max*100).toFixed(1)}%;opacity:${Math.max(0.35,1-i*0.055).toFixed(2)}"></div>
      </div>
      <span class="bar-num">${d.count}</span>
      <span class="bar-arrow">&#9660;</span>
    </div>
    <div class="dept-drill" id="${sid}" style="display:none"></div>`;
  }).join('');
  return card('Recurrent Patterns by Department', `Issue volume ranked by department \u2014 ${pl} \u00b7 Click any row to drill down`, ts, `<div class="bar-list">${rows}</div>`);
}

function buildVenues(venues, ts, pl) {
  pl = pl || 'Last 30 Days';
  const body = (!venues || !venues.length)
    ? '<div class="empty">No F&amp;B venue data for this period.</div>'
    : `<div class="venue-grid">${venues.map(v => `
        <div class="venue-card">
          <div class="venue-name">${stripFnb(v.dept)}</div>
          <div class="venue-num">${v.count}</div>
          <div class="venue-lbl">issues</div>
        </div>`).join('')}</div>`;
  return card('Recurrent Patterns by Restaurant &amp; Venue', `F&amp;B venues only \u2014 ${pl}`, ts, body);
}

function buildYTD(ytd, ts) {
  if (!ytd) return '';
  const { total, byDepartment, byVenue, monthlyTrend } = ytd;

  const deptRows = byDepartment.map(d => `
    <div class="ytd-row"><span>${d.dept}</span><span class="ytd-cnt">${d.count}</span></div>`).join('');

  const venueRows = byVenue.map(v => `
    <div class="ytd-row"><span>${stripFnb(v.dept)}</span><span class="ytd-cnt">${v.count}</span></div>`).join('');

  const body = `
    <div class="ytd-hero">
      <span class="ytd-big">${total}</span>
      <span class="ytd-lbl">total issues logged year-to-date</span>
    </div>
    ${monthlyTrend && monthlyTrend.length ? `
    <div class="chart-wrap">
      <p class="chart-heading">Monthly Issue Volume</p>
      <canvas id="trendChart" class="chart-canvas"></canvas>
    </div>` : ''}
    <div class="ytd-tables">
      <div>
        <p class="ytd-col-title">By Department</p>
        ${deptRows}
      </div>
      ${byVenue.length ? `<div><p class="ytd-col-title">F&B Venues</p>${venueRows}</div>` : ''}
    </div>`;

  return card(`Year-to-Date Summary — ${new Date().getFullYear()}`,
    'All issues logged · Broken down by department and venue with monthly trend', ts, body);
}

function drawChart(monthlyTrend) {
  if (!monthlyTrend || !monthlyTrend.length) return;
  const canvas = document.getElementById('trendChart');
  if (!canvas) return;

  if (trendChart) { trendChart.destroy(); trendChart = null; }

  const gold = '#a97c2f';
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, 0, 190);
  grad.addColorStop(0, 'rgba(169,124,47,0.18)');
  grad.addColorStop(1, 'rgba(169,124,47,0)');

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: monthlyTrend.map(m => m.month),
      datasets: [{
        data: monthlyTrend.map(m => m.count),
        borderColor: gold,
        borderWidth: 2,
        backgroundColor: grad,
        fill: true,
        tension: 0.35,
        pointBackgroundColor: gold,
        pointRadius: 3,
        pointHoverRadius: 5,
      }]
    },
    options: {
      responsive: false,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#ffffff',
          borderColor: 'rgba(169,124,47,0.25)',
          borderWidth: 1,
          titleColor: gold,
          bodyColor: '#1a1714',
          padding: 10,
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} issues`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
          ticks: { color: '#a09082', font: { size: 11 } },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
          ticks: { color: '#a09082', font: { size: 11 }, precision: 0 },
          border: { display: false }
        }
      }
    }
  });
}

// ── Urgent issue drill-down ────────────────────────────────────────────────
let activeUrgent = null;

function urgentSafeId(cat) {
  return 'udrill-' + cat.replace(/[^a-z0-9]/gi, '-').toLowerCase();
}

function drillUrgent(cat, rowEl) {
  const uid = urgentSafeId(cat);
  const panel = document.getElementById(uid);
  if (!panel) return;

  if (activeUrgent === cat) {
    panel.style.display = 'none';
    rowEl.classList.remove('active');
    activeUrgent = null;
    return;
  }

  if (activeUrgent) {
    const prev = document.getElementById(urgentSafeId(activeUrgent));
    if (prev) prev.style.display = 'none';
    document.querySelectorAll('.tbl-row.active').forEach(r => r.classList.remove('active'));
  }

  activeUrgent = cat;
  rowEl.classList.add('active');

  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;

  // Resolve aliases so a canonical name (e.g. "HVAC & Hot Water") matches
  // records tagged with any of the original category names it was merged from.
  const catAliases = new Set([cat].concat(CAT_ALIASES_OF[cat] || []));
  const matching = allRecords.filter(r => {
    if (!(r.cats || []).some(c => catAliases.has(c))) return false;
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    return d >= startDate && d <= endDate;
  });

  // ── Click shows most recent guest examples ──
  const recent = matching
    .filter(r => r.title && r.title !== '(untitled)')
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 8);
  const exampleRows = recent.map(r => {
    const meta = [
      r.dept ? `<span class="imeta-dept">${r.dept}</span>` : null,
      r.room ? `Room ${r.room}` : null,
      fmtDate(r.date)
    ].filter(Boolean).join(' \u00b7 ');
    return `<div class="incident-row"><div class="incident-title">${r.title}</div><div class="incident-meta">${meta}</div></div>`;
  }).join('');

  panel.innerHTML = `
    <div class="drill-header">
      <span>Most Recent Guest Incidents</span>
      <span class="drill-total">${matching.length} total occurrences</span>
    </div>
    ${exampleRows || '<div style="padding:8px 0;font-size:12px;color:var(--text-3)">No titled records found.</div>'}`;
  panel.style.display = 'block';
}

// ── Hover tooltip: issue sub-category breakdown ─────────────────────────────
function showUrgentTooltip(cat, rowEl) {
  const tt = document.getElementById('issue-tooltip');
  if (!tt || !allRecords.length) return;

  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;

  const catAliases = new Set([cat].concat(CAT_ALIASES_OF[cat] || []));
  const matching = allRecords.filter(r => {
    if (!(r.cats || []).some(c => catAliases.has(c))) return false;
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    return d >= startDate && d <= endDate;
  });

  let html = `<div class="tt-title">Issue Breakdown</div>`;

  const rules = ISSUE_CLASSIFIERS[cat];
  if (rules) {
    const subMap = {};
    for (const r of matching) {
      const sub = classifyIssue(r.title || '', cat);
      if (sub) subMap[sub] = (subMap[sub] || 0) + 1;
    }
    const topSubs = Object.entries(subMap)
      .filter(([s]) => s !== 'Other')
      .map(([s, count]) => ({ s, count }))
      .sort((a, b) => b.count - a.count);
    const otherCount = subMap['Other'] || 0;
    if (otherCount > 0) topSubs.push({ s: 'Other / Unclassified', count: otherCount });

    if (topSubs.length) {
      const maxCount = topSubs[0].count;
      html += topSubs.map(({ s, count }) => `
        <div class="tt-row">
          <span class="tt-label">${s}</span>
          <div class="tt-bar-wrap"><div class="tt-bar-fill" style="width:${(count/maxCount*100).toFixed(1)}%"></div></div>
          <span class="tt-cnt">${count}</span>
        </div>`).join('');
    } else {
      html += `<div class="tt-empty">${matching.length} occurrence${matching.length !== 1 ? 's' : ''} — no breakdown available</div>`;
    }
  } else {
    html += `<div class="tt-empty">${matching.length} occurrence${matching.length !== 1 ? 's' : ''}</div>`;
  }
  html += `<div class="tt-hint">&#9660; Click row to see recent guest examples</div>`;

  tt.innerHTML = html;

  // Position: prefer right of row, flip left if near viewport edge
  const rect = rowEl.getBoundingClientRect();
  const ttW = 310;
  let left = rect.right + 14;
  if (left + ttW > window.innerWidth - 12) left = rect.left - ttW - 14;
  const top = Math.min(Math.max(rect.top, 8), window.innerHeight - tt.offsetHeight - 8);

  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
  tt.style.display = 'block';
}

function hideUrgentTooltip() {
  const tt = document.getElementById('issue-tooltip');
  if (tt) tt.style.display = 'none';
}

// ── Service dept drill (click → recent examples) ───────────────────────────
let activeServiceDept = null;

function getServiceDeptEntry(label) {
  return SERVICE_DEPT_ORDER.find(e => e.label === label);
}

function getServiceDeptRecords(label, startDate, endDate) {
  const entry = getServiceDeptEntry(label);
  if (!entry) return [];
  return allRecords.filter(r => {
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    if (d < startDate || d > endDate) return false;
    return matchesDept(r, entry);
  });
}

function drillServiceDept(label, rowEl) {
  const uid = urgentDeptSafeId(label);
  const panel = document.getElementById(uid);
  if (!panel) return;

  if (activeServiceDept === label) {
    panel.style.display = 'none';
    rowEl.classList.remove('active');
    activeServiceDept = null;
    return;
  }
  if (activeServiceDept) {
    const prev = document.getElementById(urgentDeptSafeId(activeServiceDept));
    if (prev) prev.style.display = 'none';
    document.querySelectorAll('.svc-row.active').forEach(r => r.classList.remove('active'));
  }
  activeServiceDept = label;
  rowEl.classList.add('active');

  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;
  const matching = getServiceDeptRecords(label, startDate, endDate);

  const recent = matching
    .filter(r => r.title && r.title !== '(untitled)')
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 8);
  const exampleRows = recent.map(r => {
    const meta = [
      r.room ? `Room ${r.room}` : null,
      fmtDate(r.date)
    ].filter(Boolean).join(' \u00b7 ');
    return `<div class="incident-row"><div class="incident-title">${r.title}</div><div class="incident-meta">${meta}</div></div>`;
  }).join('');

  panel.innerHTML = `
    <div class="drill-header">
      <span>Most Recent Incidents — ${label}</span>
      <span class="drill-total">${matching.length} total</span>
    </div>
    ${exampleRows || '<div style="padding:8px 0;font-size:12px;color:var(--text-3)">No titled records found.</div>'}`;
  panel.style.display = 'block';
}

// ── Service dept hover tooltip — keyword-based sub-topic breakdown ──────────
function showServiceTooltip(label, rowEl) {
  const tt = document.getElementById('issue-tooltip');
  if (!tt || !allRecords.length) return;
  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;
  const matching = getServiceDeptRecords(label, startDate, endDate);

  const rules = DEPT_CLASSIFIERS[label];
  let html = `<div class="tt-title">Issue Breakdown — ${label}</div>`;

  if (rules && matching.length) {
    // Classify each record's title against dept-specific keyword rules
    const subMap = {};
    for (const r of matching) {
      const t = (r.title || '').toLowerCase();
      let matched = false;
      for (const { sub, keys } of rules) {
        if (keys.some(k => t.includes(k))) {
          subMap[sub] = (subMap[sub] || 0) + 1;
          matched = true;
          break;
        }
      }
      if (!matched) subMap['Other'] = (subMap['Other'] || 0) + 1;
    }
    const topSubs = Object.entries(subMap)
      .filter(([s]) => s !== 'Other')
      .map(([s, n]) => ({ s, n }))
      .sort((a, b) => b.n - a.n);
    const otherN = subMap['Other'] || 0;
    if (otherN) topSubs.push({ s: 'Other / Unclassified', n: otherN });

    if (topSubs.length) {
      const maxN = topSubs[0].n;
      html += topSubs.map(({ s, n }) => `
        <div class="tt-row">
          <span class="tt-label">${s}</span>
          <div class="tt-bar-wrap"><div class="tt-bar-fill" style="width:${(n/maxN*100).toFixed(1)}%"></div></div>
          <span class="tt-cnt">${n}</span>
        </div>`).join('');
    } else {
      html += `<div class="tt-empty">${matching.length} records</div>`;
    }
  } else {
    html += `<div class="tt-empty">${matching.length} record${matching.length !== 1 ? 's' : ''} in this period</div>`;
  }
  html += `<div class="tt-hint">&#9660; Click to see recent examples</div>`;
  tt.innerHTML = html;

  const rect = rowEl.getBoundingClientRect();
  const ttW = 310;
  let left = rect.right + 14;
  if (left + ttW > window.innerWidth - 12) left = rect.left - ttW - 14;
  const top = Math.min(Math.max(rect.top, 8), window.innerHeight - 350);
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
  tt.style.display = 'block';
}

// ── Department drill-down ──────────────────────────────────────────────────
let activeDept = null;

function drillDept(dept, rowEl) {
  const sid = deptSafeId(dept);
  const panel = document.getElementById(sid);
  if (!panel) return;

  // Collapse if already open
  if (activeDept === dept) {
    panel.style.display = 'none';
    rowEl.classList.remove('active');
    activeDept = null;
    return;
  }

  // Close any previously open panel
  if (activeDept) {
    const prev = document.getElementById(deptSafeId(activeDept));
    if (prev) prev.style.display = 'none';
    document.querySelectorAll('.bar-row.active').forEach(r => r.classList.remove('active'));
  }

  activeDept = dept;
  rowEl.classList.add('active');

  // Compute top categories for this dept in current period
  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;

  const filtered = allRecords.filter(r => {
    if (r.dept !== dept) return false;
    const d = new Date(r.date + (r.date.length === 10 ? 'T00:00:00Z' : ''));
    return d >= startDate && d <= endDate;
  });

  const catMap = {};
  for (const r of filtered) {
    for (const cat of (r.cats || [])) {
      catMap[cat] = (catMap[cat] || 0) + 1;
    }
  }

  const topCats = Object.entries(catMap)
    .filter(([cat]) => !isNonActionable(cat))
    .map(([cat, count]) => ({ cat, count }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 10);

  const maxCat = topCats.length ? topCats[0].count : 1;

  const rows = topCats.length
    ? topCats.map(({ cat, count }) => `
        <div class="drill-row">
          <span class="drill-cat">${cat}</span>
          <div class="drill-bar-wrap"><div class="drill-bar-fill" style="width:${(count/maxCat*100).toFixed(1)}%"></div></div>
          <span class="drill-cnt">${count}</span>
        </div>`).join('')
    : '<div class="empty" style="padding:12px">No categorized issues found.</div>';

  panel.innerHTML = `
    <div class="drill-header">
      <span>Top Issue Categories</span>
      <span class="drill-total">${filtered.length} issue${filtered.length !== 1 ? 's' : ''} total</span>
    </div>
    ${rows}`;
  panel.style.display = 'block';
}

// ── Period selection ───────────────────────────────────────────────────────
function selectPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-period') === period);
  });
  const cr = document.getElementById('customRange');
  cr.style.display = period === 'custom' ? 'flex' : 'none';
  if (period !== 'custom') applyPeriod();
}

function applyCustom() {
  customFromVal = document.getElementById('customFrom').value;
  customToVal   = document.getElementById('customTo').value;
  if (customFromVal && customToVal) applyPeriod();
}

function applyPeriod() {
  activeDept = null;
  activeUrgent = null;
  if (!allRecords.length) return;
  const [startDate, endDate] = getPeriodRange(currentPeriod, customFromVal, customToVal);
  if (!startDate) return;
  const pl       = getPeriodLabel(currentPeriod, startDate, endDate);
  const sections = computeSections(allRecords, startDate, endDate);
  const ytd      = computeYTD(allRecords);
  const ts       = lastTs;

  const svc    = buildServiceSection(sections.serviceDepts, ts, pl);
  const urgent = buildFacilitySection(sections.facilityIssues, ts, pl);
  const rooms  = buildRooms(sections.roomPatterns, ts, pl);
  const venues = buildVenues(sections.venuePatterns, ts, pl);
  const spaces = buildPublicSpaces(sections.publicSpacePatterns, ts, pl);
  const depts  = buildDepts(sections.deptPatterns, ts, pl);
  const ytdHtml = buildYTD(ytd, ts);

  const dash = document.getElementById('dashboard');
  dash.innerHTML = `${svc}${urgent}<div class="two-col">${rooms}${venues}</div>${spaces}${depts}${ytdHtml}`;
  dash.style.display = 'flex';

  setTimeout(() => drawChart(ytd && ytd.monthlyTrend), 50);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderDashboard(data) {
  allRecords = data.records || [];
  lastTs     = data.lastUpdated;

  document.getElementById('meta').innerHTML =
    `Live \u00b7 Notion Guest Issues Task Tracker<span class="sep">\u00b7</span>${data.totalRecords} records`;

  applyPeriod();
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function loadDashboard(bust = false) {
  if (STATIC_MODE && !bust) {
    renderDashboard(window.DASHBOARD_DATA);
    return;
  }

  setRefreshing(true);
  document.getElementById('state-area').innerHTML = '';

  if (!bust) {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('state-area').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <p class="state-text">Pulling live data from Notion\u2026</p>
      </div>`;
  }

  try {
    const url = bust ? '/api/dashboard?refresh=true' : '/api/dashboard';
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    document.getElementById('state-area').innerHTML = '';
    renderDashboard(data);
  } catch (e) {
    document.getElementById('state-area').innerHTML = `
      <div class="state-box">
        <p class="state-err">\u26a0 Unable to load dashboard</p>
        <p class="state-code">${e.message}</p>
      </div>`;
    if (bust) document.getElementById('dashboard').style.display = 'flex';
  } finally {
    setRefreshing(false);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
initHeaderAction();
loadDashboard();
</script>
